<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1a1a2e">
  <title>Upp med huvudet!</title>
  <script type="module" src="/src/main.js"></script>
</head>
<body class="bg-bg text-white min-h-dvh overflow-hidden font-sans" x-data="game" x-init="init()">

  <!-- ============================================================ -->
  <!-- SCREEN: Language Select                                       -->
  <!-- ============================================================ -->
  <section
    x-show="screen === 'lang-select'"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0 scale-95"
    x-transition:enter-end="opacity-100 scale-100"
    class="screen fixed inset-0 flex flex-col items-center justify-center gap-8 p-6"
  >
    <h1 class="text-4xl sm:text-5xl font-black tracking-tight text-center">
      🎉 Upp med huvudet!
    </h1>
    <p class="text-lg text-white/60">Välj språk / Select language</p>
    <div class="flex flex-col sm:flex-row gap-4 w-full max-w-sm">
      <button
        @click="selectLanguage('sv')"
        class="flex-1 py-5 px-8 rounded-2xl bg-accent text-white text-xl font-bold hover:bg-accent/80 active:scale-95 transition-all"
      >
        🇸🇪 Svenska
      </button>
      <button
        @click="selectLanguage('en')"
        class="flex-1 py-5 px-8 rounded-2xl bg-accent text-white text-xl font-bold hover:bg-accent/80 active:scale-95 transition-all"
      >
        🇬🇧 English
      </button>
    </div>
  </section>

  <!-- ============================================================ -->
  <!-- SCREEN: Category Select (Menu)                                -->
  <!-- ============================================================ -->
  <section
    x-show="screen === 'menu'"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0 scale-95"
    x-transition:enter-end="opacity-100 scale-100"
    class="screen fixed inset-0 flex flex-col items-center p-4 sm:p-6 overflow-y-auto"
  >
    <!-- Header -->
    <div class="w-full max-w-2xl flex items-center justify-between mb-6 mt-2">
      <h2 class="text-2xl sm:text-3xl font-bold" x-text="t('selectCategory')"></h2>
      <button
        @click="changeLang()"
        class="px-4 py-2 rounded-xl bg-white/10 text-sm font-medium hover:bg-white/20 transition"
        x-text="lang === 'sv' ? '🇬🇧 English' : '🇸🇪 Svenska'"
      ></button>
    </div>

    <!-- Motion permission button (iOS) -->
    <button
      x-show="needsMotionPermission"
      @click="enableMotion()"
      class="mb-4 px-6 py-3 rounded-xl bg-primary text-white font-bold text-sm animate-pulse"
      x-text="t('enableMotion')"
    ></button>

    <!-- No gyroscope warning -->
    <p
      x-show="!hasGyroscope"
      class="mb-4 text-sm text-yellow-400 text-center"
      x-text="t('noGyroscope')"
    ></p>

    <!-- Category grid -->
    <div class="w-full max-w-2xl grid grid-cols-2 gap-3 sm:gap-4">
      <template x-for="cat in categoryKeys" :key="cat">
        <button
          @click="selectCategory(cat)"
          class="category-card flex flex-col items-center justify-center gap-2 p-5 sm:p-6 rounded-2xl bg-bg-light border border-white/10 hover:border-primary/50 hover:bg-bg-light/80"
        >
          <span class="text-3xl sm:text-4xl" x-text="categoryEmoji(cat)"></span>
          <span class="text-base sm:text-lg font-semibold" x-text="categoryName(cat)"></span>
        </button>
      </template>
    </div>
  </section>

  <!-- ============================================================ -->
  <!-- SCREEN: Countdown                                             -->
  <!-- ============================================================ -->
  <section
    x-show="screen === 'countdown'"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    class="screen fixed inset-0 flex flex-col items-center justify-center gap-4 p-6 bg-bg"
  >
    <p class="text-xl sm:text-2xl text-white/70 text-center font-medium" x-text="t('holdOnForehead')"></p>
    <div class="countdown-number font-black text-white" x-text="countdownNumber"></div>
    <div class="flex gap-6 text-sm text-white/50">
      <span x-text="'⬇️ ' + t('tiltDown')"></span>
      <span x-text="'⬆️ ' + t('tiltUp')"></span>
    </div>
  </section>

  <!-- ============================================================ -->
  <!-- SCREEN: Playing                                               -->
  <!-- ============================================================ -->
  <section
    x-show="screen === 'playing'"
    x-transition:enter="transition ease-out duration-100"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    class="screen fixed inset-0 flex flex-col bg-bg"
  >
    <!-- Timer bar -->
    <div class="w-full h-2 bg-white/10">
      <div
        class="timer-bar h-full bg-primary rounded-r-full"
        :style="`width: ${timerPercent}%`"
      ></div>
    </div>

    <!-- Timer text -->
    <div class="text-center pt-2 text-lg font-mono text-white/60" x-text="timeLeft + 's'"></div>

    <!-- Word display -->
    <div class="flex-1 flex items-center justify-center px-6">
      <h1
        class="word-display font-black text-center text-word uppercase leading-tight"
        x-text="currentWord"
      ></h1>
    </div>

    <!-- Flash overlays -->
    <div
      x-show="showFlash === 'correct'"
      class="fixed inset-0 bg-correct pointer-events-none flash-correct"
    ></div>
    <div
      x-show="showFlash === 'pass'"
      class="fixed inset-0 bg-pass pointer-events-none flash-pass"
    ></div>

    <!-- Fallback tap buttons (when no gyroscope) -->
    <div
      x-show="!hasGyroscope || (needsMotionPermission && !orientationGranted)"
      class="fixed inset-0 top-12 grid grid-cols-2"
    >
      <button
        @click="markCorrect()"
        class="fallback-btn flex items-center justify-center bg-correct/20 border-r border-white/10 text-correct text-xl font-bold"
        x-text="t('tapCorrect')"
      ></button>
      <button
        @click="markPass()"
        class="fallback-btn flex items-center justify-center bg-pass/20 text-pass text-xl font-bold"
        x-text="t('tapPass')"
      ></button>
    </div>

    <!-- Score pill -->
    <div class="absolute bottom-4 left-1/2 -translate-x-1/2 px-4 py-1 rounded-full bg-white/10 text-sm font-mono">
      <span x-text="correctCount"></span> ✓
    </div>
  </section>

  <!-- ============================================================ -->
  <!-- SCREEN: Results                                               -->
  <!-- ============================================================ -->
  <section
    x-show="screen === 'results'"
    x-transition:enter="transition ease-out duration-300"
    x-transition:enter-start="opacity-0 translate-y-4"
    x-transition:enter-end="opacity-100 translate-y-0"
    class="screen fixed inset-0 flex flex-col items-center p-4 sm:p-6 overflow-y-auto bg-bg"
  >
    <h2 class="text-3xl sm:text-4xl font-black mt-4 mb-2" x-text="t('results')"></h2>

    <!-- Score summary -->
    <div class="flex gap-6 mb-6 text-lg">
      <div class="flex items-center gap-2">
        <span class="w-3 h-3 rounded-full bg-correct inline-block"></span>
        <span><strong x-text="correctCount"></strong> <span x-text="t('wordsGuessed')"></span></span>
      </div>
      <div class="flex items-center gap-2">
        <span class="w-3 h-3 rounded-full bg-pass inline-block"></span>
        <span><strong x-text="passCount"></strong> <span x-text="t('wordsPassed')"></span></span>
      </div>
    </div>

    <!-- Word list -->
    <div class="w-full max-w-md space-y-2 mb-6">
      <template x-for="(item, idx) in results" :key="idx">
        <div
          class="flex items-center justify-between px-4 py-3 rounded-xl"
          :class="item.result === 'correct' ? 'bg-correct/15' : 'bg-pass/15'"
        >
          <span class="font-medium" x-text="item.word"></span>
          <span
            class="text-lg"
            :class="item.result === 'correct' ? 'text-correct' : 'text-pass'"
            x-text="item.result === 'correct' ? '✓' : '✗'"
          ></span>
        </div>
      </template>
    </div>

    <!-- Action buttons -->
    <div class="flex gap-4 w-full max-w-md mb-8">
      <button
        @click="goToMenu()"
        class="flex-1 py-4 rounded-2xl bg-white/10 text-white font-bold text-lg hover:bg-white/20 transition active:scale-95"
        x-text="t('backToMenu')"
      ></button>
      <button
        @click="playAgain()"
        class="flex-1 py-4 rounded-2xl bg-primary text-white font-bold text-lg hover:bg-primary/80 transition active:scale-95"
        x-text="t('playAgain')"
      ></button>
    </div>
  </section>

  <!-- ============================================================ -->
  <!-- OVERLAY: Rotate to landscape (during gameplay)                -->
  <!-- ============================================================ -->
  <div
    x-show="screen === 'playing' || screen === 'countdown'"
    class="landscape-only fixed inset-0 z-50 bg-bg/95 flex-col items-center justify-center gap-4 hidden"
  >
    <div class="text-5xl">📱↔️</div>
    <p class="text-xl text-white/80 text-center px-8" x-text="t('rotate')"></p>
  </div>

</body>
</html>
